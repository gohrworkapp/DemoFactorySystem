<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo Factory</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1A1A1A;
            --input-bg: #2A2A2A;
            --text-main: #FFFFFF;
            --brand-grad: linear-gradient(90deg, #FFC805 0%, #FF0080 50%, #00B9F2 100%);
            --accent-color: #FFC805;
            --success-color: #00C851;
            --danger-color: #ff4444;
            --disable-color: #333333;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Kanit', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px;
        }

        .brand-title { font-size: 24px; font-weight: bold; background: var(--brand-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 5px; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .cust-info { font-size: 13px; color: #ddd; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent-color); }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--brand-grad); }
        .btn-pm { background: linear-gradient(90deg, #00B9F2, #0055ff); }
        .btn-qc { background: linear-gradient(90deg, #00C851, #007E33); }
        .btn-ship { background: linear-gradient(90deg, #FF0080, #9900CC); }
        .btn-merch { background: linear-gradient(90deg, #FF9800, #F57C00); }
        .btn-reject { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
        .btn-disabled { background: var(--disable-color) !important; color: #777 !important; cursor: not-allowed; border: 1px solid #444 !important; pointer-events: none; }

        /* Inputs */
        .input-label { font-size: 13px; color: var(--accent-color); margin-bottom: 5px; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; font-family: 'Kanit'; font-size: 14px; }
        input[type="file"] { padding: 8px; font-size: 12px; }
        
        /* Filter & Tabs */
        .filter-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: #666; font-size: 16px; font-weight: bold; padding: 5px 10px; cursor: pointer; flex: 1; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

        /* Dashboard Stats */
        .dashboard-stats { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .stat-box { background: #252525; border: 1px solid #333; border-radius: 8px; min-width: 85px; padding: 12px; text-align: center; flex: 1; }
        .stat-num { font-size: 22px; font-weight: bold; color: var(--accent-color); }
        .stat-label { font-size: 11px; color: #aaa; white-space: nowrap; }

        /* Progress Bar (Timeline) */
        .stepper-wrapper { display: flex; justify-content: space-between; margin-top: 15px; position: relative; }
        .stepper-item { position: relative; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stepper-item::before { content: ""; position: absolute; top: 7px; left: -50%; width: 100%; height: 2px; background: #444; z-index: 1; }
        .stepper-item:first-child::before { content: none; }
        .stepper-item.active::before { background: var(--success-color); }
        .step-counter { z-index: 2; width: 14px; height: 14px; border-radius: 50%; background: #444; border: 2px solid #222;}
        .stepper-item.active .step-counter { background: var(--success-color); box-shadow: 0 0 5px var(--success-color); border-color: var(--success-color);}
        .step-name { margin-top: 5px; font-size: 9px; color: #666; text-align: center; line-height: 1.2; }
        .stepper-item.active .step-name { color: #fff; font-weight: bold; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal.show { display: flex; }
        .modal-content { width: 100%; max-width: 400px; background: #222; padding: 20px; border-radius: 12px; border: 1px solid #444; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .status-badge { background:#333; padding:4px 8px; border-radius:6px; font-size:11px; color:var(--accent-color); border:1px solid #555; text-align: right; }
        
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent-color); object-fit: cover; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--accent-color)"></i><div style="font-size:12px; color:#aaa; margin-top:10px;">กำลังประมวลผล...</div></div>

    <div class="brand-title">DEMO FACTORY</div>
    <div style="text-align:center; color:#666; font-size:12px; margin-bottom:20px;">Smart Production System</div>

    <div id="viewRegister" class="hidden">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">ลงทะเบียนลูกค้า</h3>
            <label class="input-label">ชื่อลูกค้า / ชื่อแบรนด์</label>
            <input type="text" id="regName" placeholder="ระบุชื่อของคุณ...">
            <label class="input-label">เบอร์โทรศัพท์ (สำคัญมาก)</label>
            <input type="tel" id="regPhone" placeholder="เช่น 0812345678">
            <button class="btn btn-main" onclick="register()">ยืนยันการลงทะเบียน</button>
        </div>
    </div>

    <div id="viewStaff" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#222; padding:12px; border-radius:8px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="staffProfilePic" src="https://via.placeholder.com/50" class="profile-img">
                <div>
                    <div id="staffName" style="font-weight:bold; font-size:15px;">User</div>
                    <div id="staffRole" style="font-size:11px; color:#aaa;">ROLE</div>
                </div>
            </div>
            <div id="staffTier" style="font-size:12px; background:#111; padding:4px 8px; border-radius:4px; border:1px solid #444;">-</div>
        </div>

        <div class="filter-container">
            <input type="text" id="staffSearch" placeholder="🔍 ค้นหา ชื่อ, เบอร์, Order No..." onkeyup="filterStaffList()">
            <select id="staffStatusFilter" onchange="filterStaffList()">
                <option value="ACTIVE">งานที่กำลังดำเนินการ</option>
                <option value="ALL">งานทั้งหมด</option>
                <option value="Pending Customer Confirmation">1. รอตรวจสอบใบสั่งงาน</option>
                <option value="Order Confirmation">2. ยืนยันออเดอร์</option>
                <option value="Work Order Review Stage">3. ตรวจสอบ Work Order</option>
                <option value="Sampling Stage">4. งานตัวอย่าง</option>
                <option value="Pre-Production Approved">5. ลูกค้าอนุมัติแบบ</option>
                <option value="Bulk Production">6. กำลังผลิต</option>
                <option value="Quality Control">7. ตรวจสอบคุณภาพ</option>
                <option value="Correction Needed">⚠ งานต้องแก้ไข (QC ตีกลับ)</option>
                <option value="Shipped">8. จัดส่งแล้ว</option>
            </select>
        </div>

        <div id="adminPanel" class="hidden">
            <button class="btn" style="background:#333; border:1px solid #555; margin-bottom:15px;" onclick="document.getElementById('createOrderForm').classList.toggle('hidden')">
                <i class="fas fa-file-invoice"></i> + สร้างออเดอร์ใหม่ (Sales)
            </button>
            
            <div id="createOrderForm" class="card hidden">
                <h4 style="margin-top:0; color:var(--accent-color); border-bottom:1px solid #333; padding-bottom:10px;">เปิดออเดอร์ใหม่</h4>
                
                <label class="input-label">1. เบอร์โทรลูกค้า</label>
                <input type="tel" id="ordPhone" placeholder="08x-xxx-xxxx">
                
                <label class="input-label">2. Batch / Lot Reference</label>
                <input type="text" id="ordBatch" placeholder="เช่น QT2026-001">

                <div class="flex-row">
                    <div style="width:50%">
                        <label class="input-label">3. ทรงเสื้อ (Style)</label>
                        <select id="ordStyle"><option>Loading...</option></select>
                    </div>
                    <div style="width:50%">
                        <label class="input-label">4. จำนวน (Qty)</label>
                        <input type="number" id="ordQty" placeholder="100">
                    </div>
                </div>

                <label class="input-label">5. ชนิดผ้า (Fabric)</label>
                <select id="ordFabric"><option>Loading...</option></select>

                <label class="input-label">6. วันที่กำหนดส่งมอบ</label>
                <input type="date" id="ordDate">

                <label class="input-label">7. ที่อยู่จัดส่ง</label>
                <textarea id="ordAddress" rows="2" placeholder="รายละเอียดที่อยู่..."></textarea>

                <label class="input-label">8. รายละเอียดเพิ่มเติม</label>
                <textarea id="ordDetail" rows="2" placeholder="จุดสกรีน, ขนาด..."></textarea>

                <label class="input-label">9. แนบใบสั่งงาน (Work Order - รูปภาพ)</label>
                <input type="file" id="ordWoImage" accept="image/*" onchange="processImage(this, 'new_wo', 'wo')">
                <div id="status-wo-new_wo" style="font-size:12px; margin-top:5px; display:none;"></div>

                <button class="btn btn-main" style="margin-top:15px;" onclick="createOrder()">บันทึก & แจ้งลูกค้ายืนยัน</button>
            </div>
        </div>

        <div id="staffTaskList">Loading tasks...</div>
    </div>

    <div id="viewCustomer" class="hidden">
        <div style="display:flex; flex-direction:column; align-items:center; background:#222; padding:20px 15px; border-radius:12px; margin-bottom:15px; border: 1px solid #444;">
            <img id="custProfilePic" src="https://via.placeholder.com/80" style="width:70px; height:70px; border-radius:50%; border:3px solid var(--accent-color); margin-bottom:10px;">
            <h3 style="margin:0; color:#fff;" id="custHeaderName">สวัสดีครับ</h3>
            <div id="custHeaderTier" style="font-size:13px; color:var(--accent-color); margin-top:5px; background:#111; padding:4px 12px; border-radius:12px;">Tier</div>
        </div>
        
        <div class="tab-container">
            <button class="tab-btn active" onclick="switchCustTab('list')">รายการออเดอร์</button>
            <button class="tab-btn" onclick="switchCustTab('dashboard')">ภาพรวม (Dashboard)</button>
        </div>

        <div id="custListView"><div id="customerOrderList">Loading...</div></div>
        
        <div id="custDashView" class="hidden">
            <div class="dashboard-stats">
                <div class="stat-box"><div class="stat-num" id="stat-confirm">0</div><div class="stat-label">ยืนยันแล้ว</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-prod">0</div><div class="stat-label">กำลังผลิต</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-done" style="color:var(--success-color)">0</div><div class="stat-label">ส่งมอบแล้ว</div></div>
            </div>
            <p style="text-align:center; color:#666; font-size:12px; margin-top:20px;">ขอบคุณที่ไว้วางใจใช้บริการ Demo Factory</p>
        </div>
    </div>

    <div id="modalFeedback" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--danger-color); margin-top:0;"><i class="fas fa-exclamation-triangle"></i> ตีกลับงาน (QC)</h3>
            <label class="input-label">ระบุสาเหตุที่ต้องให้ PM แก้ไข</label>
            <input type="hidden" id="fbOrderNo">
            <textarea id="fbReason" rows="4" placeholder="ระบุจุดที่ต้องแก้ไขให้ชัดเจน..."></textarea>
            <div class="flex-row" style="margin-top:15px;">
                <button class="btn" style="background:#444;" onclick="closeModal('modalFeedback')">ยกเลิก</button>
                <button class="btn" style="background:var(--danger-color);" onclick="confirmRollback()">ยืนยันการส่งกลับ</button>
            </div>
        </div>
    </div>

    <div id="modalRejectPP" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--danger-color); margin-top:0;"><i class="fas fa-times-circle"></i> ไม่อนุมัติแบบ (PP Reject)</h3>
            <label class="input-label">ระบุสาเหตุ / จุดที่ต้องการให้แก้ไข</label>
            <input type="hidden" id="rejPPOrderNo">
            <textarea id="rejPPReason" rows="4" placeholder="แขนเสื้อสั้นไป, สีโลโก้ไม่ตรง..."></textarea>
            <div class="flex-row" style="margin-top:15px;">
                <button class="btn" style="background:#444;" onclick="closeModal('modalRejectPP')">ยกเลิก</button>
                <button class="btn" style="background:var(--danger-color);" onclick="confirmRejectPP()">แจ้งฝ่ายผลิต</button>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const GAS_API = 'https://script.google.com/macros/s/AKfycbwkKthBXAVm3kyVyr8f-PKdMmM2D3Trd1bvvWAs5uS1Q6CmhggJo4YO_rHREeWOBy4EDA/exec'; 
        const LIFF_ID = '2009142530-l2sIA52W';
        // =================================================

        let userProfile = {};
        let linePictureUrl = 'https://via.placeholder.com/80';
        let currentUserRole = '';
        let globalOrders = [];

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                userProfile = await liff.getProfile();
                if(userProfile.pictureUrl) linePictureUrl = userProfile.pictureUrl;
                checkUser();
            } catch(e) { alert("LIFF Init Error: กรุณาตรวจสอบ LIFF ID"); }
        }
        main();

        function checkUser() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_user', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                document.getElementById('loader').classList.add('hidden');
                if (res.found) {
                    currentUserRole = res.data.Role;
                    if (['Admin', 'Sales Admin', 'Production Manager', 'Quality Control', 'Merchandiser', 'Sales Coordinators'].includes(currentUserRole)) {
                        showStaffDashboard(res.data);
                    } else {
                        showCustomerView(res.data);
                    }
                } else {
                    document.getElementById('viewRegister').classList.remove('hidden');
                }
            });
        }

        function getTierDisplay(tier) {
            if (tier === 'VVIP') return '👑 VVIP';
            if (tier === 'VIP') return '⭐️ VIP';
            return '👤 Regular';
        }

        // --- Role Access Helper ---
        function hasAccess(role) {
            return currentUserRole === role || currentUserRole === 'Admin' || currentUserRole === 'Sales Coordinators';
        }

        // --- Helper: Convert Image to Base64 ---
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        let preloadedImages = {}; 

        async function processImage(input, orderNo, type) {
            let btnId = ''; let statusId = '';
            if(type === 's') { btnId = `btn-s-${orderNo}`; statusId = `status-s-${orderNo}`; }
            else if(type === 'ship') { btnId = `btn-ship-${orderNo}`; statusId = `status-ship-${orderNo}`; }
            else if(type === 'wo') { statusId = `status-wo-${orderNo}`; } // For WO upload

            const btn = btnId ? document.getElementById(btnId) : null;
            const status = document.getElementById(statusId);
            const key = `${type}-${orderNo}`;

            if (input.files.length > 0) {
                if(btn) { btn.classList.add('btn-disabled'); btn.disabled = true; }
                status.style.display = 'block';
                status.style.color = 'var(--accent-color)';
                status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังประมวลผลไฟล์...';

                try {
                    const base64 = await getBase64(input.files[0]);
                    preloadedImages[key] = base64; 
                    status.style.color = 'var(--success-color)';
                    status.innerHTML = '<i class="fas fa-check-circle"></i> ไฟล์พร้อมส่งแล้ว';
                    if(btn) { btn.classList.remove('btn-disabled'); btn.disabled = false; }
                } catch (e) {
                    status.style.color = 'var(--danger-color)';
                    status.innerHTML = '<i class="fas fa-times-circle"></i> เกิดข้อผิดพลาด กรุณาเลือกไฟล์ใหม่';
                    if(btn) { btn.classList.remove('btn-disabled'); btn.disabled = false; }
                }
            } else {
                status.style.display = 'none';
                delete preloadedImages[key];
            }
        }

        // --- STAFF SECTION ---
        function showStaffDashboard(data) {
            document.getElementById('viewStaff').classList.remove('hidden');
            document.getElementById('staffName').innerText = data.RealName;
            document.getElementById('staffRole').innerText = data.Role;
            document.getElementById('staffTier').innerText = getTierDisplay(data.Tier);
            document.getElementById('staffProfilePic').src = linePictureUrl;

            if (hasAccess('Sales Admin')) {
                document.getElementById('adminPanel').classList.remove('hidden');
                fetchOptions();
            }
            fetchStaffData();
        }

        function fetchStaffData() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_all_orders' }) })
            .then(r => r.json()).then(res => {
                globalOrders = res.orders;
                document.getElementById('staffStatusFilter').value = "ACTIVE"; 
                filterStaffList();
            });
        }

        // Toggle Delivery Inputs (Messenger vs Parcel)
        function toggleDelivery(no, method, type) {
            const trackDiv = document.getElementById(`box-track-${type}-${no}`);
            const phoneDiv = document.getElementById(`box-phone-${type}-${no}`);
            if(method === 'Messenger') {
                trackDiv.style.display = 'none';
                phoneDiv.style.display = 'block';
            } else {
                trackDiv.style.display = 'block';
                phoneDiv.style.display = 'none';
            }
        }

        function filterStaffList() {
            const keyword = document.getElementById('staffSearch').value.toLowerCase();
            const statusFilter = document.getElementById('staffStatusFilter').value;
            const list = document.getElementById('staffTaskList');
            
            let filtered = globalOrders;

            if (statusFilter === 'ACTIVE') {
                filtered = filtered.filter(o => o.status !== 'Shipped'); 
            } else if (statusFilter !== 'ALL') {
                filtered = filtered.filter(o => o.status.includes(statusFilter));
            }

            if (keyword) {
                filtered = filtered.filter(o => 
                    o.orderNo.toLowerCase().includes(keyword) || 
                    (o.custName && o.custName.toLowerCase().includes(keyword)) ||
                    (o.custPhone && o.custPhone.includes(keyword))
                );
            }

            if (filtered.length === 0) { list.innerHTML = '<div class="card text-center" style="color:#666; padding:30px;">ไม่พบรายการงาน</div>'; return; }

            let html = '';
            filtered.forEach(o => {
                let btns = '';
                
                const isPassed = (current, target) => {
                    const steps = ['Pending Customer Confirmation', 'Order Confirmation', 'Work Order Review Stage', 'Sampling Stage', 'Pre-Production Approved', 'Bulk Production (50%)', 'Quality Control Passed', 'Shipped'];
                    return steps.indexOf(current) >= steps.indexOf(target);
                };

                const custInfo = `
                    <div class="cust-info">
                        <div style="font-size:14px; margin-bottom:5px;">👤 <b>${o.custName}</b> <span style="font-size:11px; margin-left:5px;">${getTierDisplay(o.tier)}</span></div>
                        <div style="font-size:13px;"><a href="tel:${o.custPhone}" style="color:var(--accent-color); text-decoration:none;"><i class="fas fa-phone"></i> ${o.custPhone}</a></div>
                        <div style="font-size:12px; color:#aaa; border-top:1px dashed #444; padding-top:5px; margin-top:5px;">📍 <b>จัดส่ง:</b> ${o.address || '-'}</div>
                    </div>`;

                // --- กรณีรอตรวจสอบ / ตีกลับจากลูกค้า ---
                if (o.status === 'Pending Customer Confirmation') {
                    btns += `<div style="color:var(--accent-color); font-size:12px; text-align:center; margin-top:10px;">⏳ รอให้ลูกค้ายืนยันออเดอร์</div>`;
                }
                
                if (o.status === 'PP Rejected') {
                    btns += `<div style="background:var(--danger-color); color:#fff; padding:10px; border-radius:8px; margin-top:8px; font-size:12px;">
                        <b>ลูกค้ายกเลิก/ไม่อนุมัติแบบ:</b> ${o.ppFeedback || '-'}
                    </div>`;
                }

                // --- กรณีติดปัญหา (Correction Needed จาก QC) กลับไปให้ PM ---
                if (o.status === 'Correction Needed') {
                    if (hasAccess('Production Manager')) {
                        html += `<div class="card" style="border:1px solid var(--danger-color)">
                            <div class="card-header"><strong style="color:var(--danger-color)">⚠ PM ต้องแก้ไข (${o.orderNo})</strong><span class="status-badge" style="background:var(--danger-color)">Fix Needed</span></div>
                            ${custInfo}
                            <p style="font-size:13px; color:#fff; background:#333; padding:10px; border-radius:6px; border-left:3px solid var(--danger-color);"><b>สาเหตุจาก QC:</b> ${o.feedback}</p>
                            <button class="btn" style="background:var(--success-color);" onclick="updateStatus('${o.orderNo}', 'SUBMIT_FIX')"><i class="fas fa-check-circle"></i> แก้ไขเสร็จสิ้น (ส่ง QC ตรวจใหม่)</button>
                        </div>`;
                    } else {
                        html += `<div class="card" style="border:1px solid var(--danger-color)">
                            <div class="card-header"><strong style="color:var(--danger-color)">⚠ รอ PM แก้ไข (${o.orderNo})</strong></div>
                            <p style="font-size:12px; color:#aaa;">เหตุผลการตีกลับ: ${o.feedback}</p>
                        </div>`;
                    }
                    return; 
                }

                // --- ปุ่ม Production Manager ---
                if (hasAccess('Production Manager')) {
                    if (o.status === 'Order Confirmation') {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'WO_APPROVE')"><i class="fas fa-clipboard-check"></i> อนุมัติ Work Order</button>`;
                    } else if (o.status === 'Pre-Production Approved') {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'UPDATE_50')"><i class="fas fa-bolt"></i> แจ้งผลิตเสร็จ 50%</button>`;
                    }
                }

                // --- ปุ่ม Merchandiser ---
                if (hasAccess('Merchandiser')) {
                    if (o.status === 'Work Order Review Stage') {
                        btns += `<div style="background:#222; padding:10px; border-radius:8px; margin-top:8px;">
                            <label style="font-size:12px; color:var(--accent-color);">วิธีส่งตัวอย่าง:</label>
                            <select id="del-s-${o.orderNo}" onchange="toggleDelivery('${o.orderNo}', this.value, 's')" style="margin-bottom:8px;">
                                <option value="Parcel">ส่งพัสดุ (J&T)</option>
                                <option value="Messenger">ส่งแมสเซ็นเจอร์</option>
                            </select>
                            
                            <div id="box-track-s-${o.orderNo}"><input type="text" id="track-s-${o.orderNo}" placeholder="ระบุ Tracking J&T" style="margin-bottom:5px;"></div>
                            <div id="box-phone-s-${o.orderNo}" style="display:none;"><input type="tel" id="phone-s-${o.orderNo}" placeholder="ระบุเบอร์โทรแมสเซ็นเจอร์" style="margin-bottom:5px;"></div>
                            
                            <label style="font-size:12px; color:#aaa;">แนบหลักฐานการส่ง:</label>
                            <input type="file" id="img-s-${o.orderNo}" accept="image/*" onchange="processImage(this, '${o.orderNo}', 's')">
                            <div id="status-s-${o.orderNo}" style="font-size:12px; margin-top:5px; display:none;"></div>
                            <button class="btn btn-merch" id="btn-s-${o.orderNo}" style="margin-top:8px;" onclick="sendSample('${o.orderNo}')"><i class="fas fa-box"></i> แจ้งส่งตัวอย่าง</button>
                        </div>`;
                    }
                }

                // --- ปุ่ม Quality Control ---
                if (hasAccess('Quality Control')) {
                    if (o.status === 'Bulk Production (50%)') {
                        btns += `<div class="flex-row">
                            <button class="btn btn-qc" style="flex:2;" onclick="updateStatus('${o.orderNo}', 'QC_PASS')"><i class="fas fa-check-circle"></i> ให้ผ่าน QC</button>
                            <button class="btn btn-reject" style="flex:1;" onclick="openFeedback('${o.orderNo}')"><i class="fas fa-undo"></i> ตีกลับให้ PM</button>
                        </div>`;
                    }
                }

                // --- ปุ่ม Sales Admin ---
                if (hasAccess('Sales Admin')) {
                    if (o.status === 'Quality Control Passed') {
                        btns += `<div style="background:#222; padding:10px; border-radius:8px; margin-top:8px;">
                            <label style="font-size:12px; color:var(--accent-color);">วิธีจัดส่งสินค้า:</label>
                            <select id="del-ship-${o.orderNo}" onchange="toggleDelivery('${o.orderNo}', this.value, 'ship')" style="margin-bottom:8px;">
                                <option value="Parcel">ส่งพัสดุ (J&T)</option>
                                <option value="Messenger">ส่งแมสเซ็นเจอร์</option>
                            </select>

                            <div id="box-track-ship-${o.orderNo}"><input type="text" id="track-ship-${o.orderNo}" placeholder="ระบุ Tracking J&T" style="margin-bottom:5px;"></div>
                            <div id="box-phone-ship-${o.orderNo}" style="display:none;"><input type="tel" id="phone-ship-${o.orderNo}" placeholder="ระบุเบอร์โทรแมสเซ็นเจอร์" style="margin-bottom:5px;"></div>
                            
                            <label style="font-size:12px; color:#aaa;">แนบหลักฐานจัดส่ง:</label>
                            <input type="file" id="img-${o.orderNo}" accept="image/*" onchange="processImage(this, '${o.orderNo}', 'ship')">
                            <div id="status-ship-${o.orderNo}" style="font-size:12px; margin-top:5px; display:none;"></div>
                            <button class="btn btn-ship" id="btn-ship-${o.orderNo}" style="margin-top:8px;" onclick="shipOrder('${o.orderNo}')"><i class="fas fa-shipping-fast"></i> ยืนยันจัดส่งลูกค้า</button>
                        </div>`;
                    } else if (o.status === 'Shipped') {
                        let delText = o.deliveryMethod === 'Messenger' ? `Messenger: ${o.messengerPhone}` : `J&T: ${o.tracking}`;
                        btns += `<div style="margin-top:10px; font-size:13px; color:var(--success-color); text-align:center; background:#111; padding:8px; border-radius:6px;">✔ จัดส่งแล้ว (${delText})</div>`;
                    }
                }

                let extraLinks = '';
                if(o.woUrl && o.woUrl !== '-') extraLinks += `<br><a href="${o.woUrl}" target="_blank" style="color:var(--accent-color); font-size:11px; text-decoration:none;"><i class="fas fa-file-pdf"></i> ดูใบสั่งงาน (WO)</a>`;
                if(o.sampleImage && o.sampleImage !== '-') extraLinks += `<br><a href="${o.sampleImage}" target="_blank" style="color:#00B9F2; font-size:11px; text-decoration:none;"><i class="fas fa-image"></i> รูปพัสดุตัวอย่าง</a>`;
                if(o.shipImage && o.shipImage !== '-') extraLinks += `<br><a href="${o.shipImage}" target="_blank" style="color:#FF0080; font-size:11px; text-decoration:none;"><i class="fas fa-image"></i> รูปพัสดุจัดส่ง</a>`;

                html += `
                <div class="card">
                    <div class="card-header">
                        <strong style="color:var(--accent-color); font-size:16px;">${o.orderNo}</strong>
                        <span class="status-badge">${o.status}</span>
                    </div>
                    ${custInfo}
                    <div style="font-size:13px; color:#ccc; display:flex; justify-content:space-between; line-height:1.6;">
                        <div>
                            ทรงเสื้อ: <span style="color:#fff;">${o.style}</span><br>
                            จำนวน: <span style="color:#fff;">${o.qty} ตัว</span><br>
                            Batch: <span style="color:#fff;">${o.batch || '-'}</span>
                        </div>
                        <div style="text-align:right;">
                            ส่งมอบ: <span style="color:#fff;">${o.delivery}</span><br>
                            <span style="font-size:11px; color:#666;">อัปเดต: ${o.updatedDate}</span>
                            ${extraLinks}
                        </div>
                    </div>
                    ${btns}
                </div>`;
            });
            list.innerHTML = html;
        }

        // --- CUSTOMER SECTION ---
        function showCustomerView(data) {
            document.getElementById('viewCustomer').classList.remove('hidden');
            document.getElementById('custHeaderName').innerText = "คุณ " + data.RealName;
            document.getElementById('custHeaderTier').innerText = getTierDisplay(data.Tier);
            document.getElementById('custProfilePic').src = linePictureUrl;
            
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_my_orders', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                let confirm = 0, prod = 0, done = 0;
                res.orders.forEach(o => {
                    if(o.status === 'Shipped') done++;
                    else if(o.status === 'Order Confirmation' || o.status === 'Pending Customer Confirmation') confirm++;
                    else prod++;
                });
                document.getElementById('stat-confirm').innerText = confirm;
                document.getElementById('stat-prod').innerText = prod;
                document.getElementById('stat-done').innerText = done;

                const list = document.getElementById('customerOrderList');
                if (res.orders.length === 0) { list.innerHTML = '<div class="card text-center" style="color:#666; padding:30px;">คุณยังไม่มีรายการสั่งผลิต</div>'; return; }
                list.innerHTML = res.orders.map(o => renderCustCard(o)).join('');
            });
        }

        function switchCustTab(tab) {
            document.querySelectorAll('#viewCustomer .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'list') {
                document.getElementById('custListView').classList.remove('hidden');
                document.getElementById('custDashView').classList.add('hidden');
            } else {
                document.getElementById('custListView').classList.add('hidden');
                document.getElementById('custDashView').classList.remove('hidden');
            }
        }

        function renderCustCard(o) {
            // Find current active step index to attach the date
            let currentStepIdx = 0;
            if (['Order Confirmation', 'Work Order Review Stage', 'Sampling Stage', 'Pre-Production Approved', 'PP Rejected'].includes(o.status)) currentStepIdx = 1;
            if (['Bulk Production (50%)'].includes(o.status)) currentStepIdx = 2;
            if (['Quality Control Passed', 'Correction Needed'].includes(o.status)) currentStepIdx = 3;
            if (o.status === 'Shipped') currentStepIdx = 4;

            const steps = [
                { label: 'รับออเดอร์', active: true, showDate: currentStepIdx === 0 }, 
                { label: 'เตรียมงาน', active: currentStepIdx >= 1, showDate: currentStepIdx === 1 },
                { label: 'กำลังผลิต', active: currentStepIdx >= 2, showDate: currentStepIdx === 2 },
                { label: 'ตรวจสอบ', active: currentStepIdx >= 3, showDate: currentStepIdx === 3 },
                { label: 'ส่งมอบ', active: currentStepIdx === 4, showDate: currentStepIdx === 4 }
            ];

            let progressHtml = '<div class="stepper-wrapper">';
            steps.forEach(s => { 
                const dateHtml = s.showDate ? `<br><span style="color:#aaa; font-size:9px;">${o.updatedDate}</span>` : '';
                progressHtml += `<div class="stepper-item ${s.active ? 'active' : ''}"><div class="step-counter"></div><div class="step-name">${s.label}${dateHtml}</div></div>`; 
            });
            progressHtml += '</div>';

            let actionHtml = '';
            
            // ลูกค้ายืนยันออเดอร์
            if (o.status === 'Pending Customer Confirmation') {
                actionHtml = `<div style="margin-top:15px; padding-top:15px; border-top:1px solid #444;">
                    <p style="font-size:13px; color:var(--accent-color); margin-bottom:10px; text-align:center;">กรุณาตรวจสอบใบสั่งงานและยืนยันออเดอร์</p>
                    ${o.woUrl !== '-' ? `<a href="${o.woUrl}" target="_blank" class="btn" style="background:#333; text-align:center; display:block; text-decoration:none; margin-bottom:8px; border:1px solid #555;"><i class="fas fa-file-pdf"></i> ดูใบสั่งงาน (Work Order)</a>` : ''}
                    <button class="btn btn-main" onclick="updateStatus('${o.orderNo}', 'CUST_CONFIRM_WO')"><i class="fas fa-check-circle"></i> ยืนยันออเดอร์ถูกต้อง</button>
                </div>`;
            }

            // ลูกค้าอนุมัติตัวแบบ
            if (o.status === 'Sampling Stage') {
                actionHtml = `<div style="margin-top:15px; padding-top:15px; border-top:1px solid #444;">
                    <p style="font-size:13px; color:var(--accent-color); margin-bottom:10px; text-align:center;">กรุณาตรวจสอบตัวอย่างและอนุมัติการผลิต</p>
                    <div class="flex-row">
                        <button class="btn btn-qc" style="flex:2;" onclick="updateStatus('${o.orderNo}', 'PP_APPROVE')"><i class="fas fa-thumbs-up"></i> อนุมัติผลิต</button>
                        <button class="btn btn-reject" style="flex:1;" onclick="openRejectPP('${o.orderNo}')"><i class="fas fa-times"></i> ไม่อนุมัติ</button>
                    </div>
                </div>`;
            }

            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong style="color:var(--accent-color); font-size:16px;">${o.orderNo}</strong>
                        <span class="status-badge">${o.status}</span>
                    </div>
                    <div style="font-size:14px; color:#ddd; background:#222; padding:10px; border-radius:8px;">
                        👕 <b>${o.style}</b> (${o.qty} ตัว)<br>
                        📅 กำหนดส่ง: <span style="color:#fff">${o.delivery}</span>
                    </div>
                    ${progressHtml}
                    ${actionHtml}
                </div>`;
        }

        // --- ACTIONS ---
        function openFeedback(no) { document.getElementById('fbOrderNo').value = no; document.getElementById('modalFeedback').classList.add('show'); }
        function openRejectPP(no) { document.getElementById('rejPPOrderNo').value = no; document.getElementById('modalRejectPP').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        
        function confirmRollback() { 
            const no = document.getElementById('fbOrderNo').value;
            const reason = document.getElementById('fbReason').value;
            if(!reason) return alert("กรุณาระบุสาเหตุที่ต้องแก้ไขให้ชัดเจน"); 
            callApi({ orderNo: no, actionType: 'ROLLBACK', reason: reason, staffName: document.getElementById('staffName').innerText }); 
            closeModal('modalFeedback'); 
        }

        function confirmRejectPP() { 
            const no = document.getElementById('rejPPOrderNo').value;
            const reason = document.getElementById('rejPPReason').value;
            if(!reason) return alert("กรุณาระบุสาเหตุที่ไม่อนุมัติให้ชัดเจน"); 
            callApi({ orderNo: no, actionType: 'PP_REJECT', reason: reason }); 
            closeModal('modalRejectPP'); 
        }
        
        function updateStatus(no, action) { 
            if(!confirm('ยืนยันการทำรายการ?')) return; 
            const staffName = document.getElementById('staffName') ? document.getElementById('staffName').innerText : 'Customer';
            callApi({ orderNo: no, actionType: action, staffName: staffName }); 
        }
        
        async function sendSample(no) { 
            const method = document.getElementById(`del-s-${no}`).value;
            const track = document.getElementById(`track-s-${no}`).value; 
            const phone = document.getElementById(`phone-s-${no}`).value; 

            if(method === 'Parcel' && !track) return alert("กรุณาระบุเลข Tracking J&T"); 
            if(method === 'Messenger' && !phone) return alert("กรุณาระบุเบอร์โทรศัพท์แมสเซ็นเจอร์"); 

            let base64Img = preloadedImages[`s-${no}`] || null; 
            document.getElementById('loader').classList.remove('hidden');
            callApi({ orderNo: no, actionType: 'SEND_SAMPLE', deliveryMethod: method, tracking: track, messengerPhone: phone, image: base64Img, staffName: document.getElementById('staffName').innerText }); 
        }
        
        async function shipOrder(no) { 
            const method = document.getElementById(`del-ship-${no}`).value;
            const track = document.getElementById(`track-ship-${no}`).value; 
            const phone = document.getElementById(`phone-ship-${no}`).value; 

            if(method === 'Parcel' && !track) return alert("กรุณาระบุเลข Tracking J&T"); 
            if(method === 'Messenger' && !phone) return alert("กรุณาระบุเบอร์โทรศัพท์แมสเซ็นเจอร์"); 

            let base64Img = preloadedImages[`ship-${no}`] || null; 
            document.getElementById('loader').classList.remove('hidden');
            callApi({ orderNo: no, actionType: 'SHIP', deliveryMethod: method, tracking: track, messengerPhone: phone, image: base64Img, staffName: document.getElementById('staffName').innerText }); 
        }
        
        function callApi(payload) { 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'update_status', data: payload }) })
            .then(r => r.json()).then(res => { 
                document.getElementById('loader').classList.add('hidden'); 
                if (res.status === 'success') { alert("บันทึกสำเร็จ!"); location.reload(); } 
                else alert("Error: " + res.message); 
            }).catch(e => {
                document.getElementById('loader').classList.add('hidden'); 
                alert("การอัปโหลดไฟล์อาจใช้เวลาสักครู่ กรุณารีเฟรชหน้าจอ");
            }); 
        }
        
        function register() { 
            const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value; 
            if(!n || !p) return alert("กรุณากรอกข้อมูลให้ครบถ้วน"); 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'register', data: { userId: userProfile.userId, displayName: userProfile.displayName, realName: n, phone: p } }) })
            .then(() => location.reload()); 
        }
        
        function createOrder() { 
            let woImg = preloadedImages['wo-new_wo'] || null;

            const payload = {
                adminName: document.getElementById('staffName').innerText,
                phone: document.getElementById('ordPhone').value,
                batch: document.getElementById('ordBatch').value,
                style: document.getElementById('ordStyle').value,
                qty: document.getElementById('ordQty').value,
                fabric: document.getElementById('ordFabric').value,
                deliveryDate: document.getElementById('ordDate').value,
                address: document.getElementById('ordAddress').value,
                detail: document.getElementById('ordDetail').value,
                woImage: woImg
            };
            if(!payload.phone || !payload.batch || !payload.address) return alert("กรุณากรอก เบอร์โทรลูกค้า, Batch และ ที่อยู่จัดส่ง ให้ครบถ้วน"); 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'create_order', data: payload }) })
            .then(r => r.json()).then(res => { 
                document.getElementById('loader').classList.add('hidden'); 
                if(res.status==='success') { 
                    alert("เปิดออเดอร์เรียบร้อย ลูกค้าจะได้รับข้อความแจ้งเตือนให้กดยืนยันครับ"); 
                    location.reload(); 
                } 
                else alert("เกิดข้อผิดพลาด: " + res.message); 
            }); 
        }
        
        function fetchOptions() { 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_options' }) })
            .then(r => r.json()).then(res => { 
                const s = document.getElementById('ordStyle'), f = document.getElementById('ordFabric'); 
                s.innerHTML = '<option value="" disabled selected>เลือกทรงเสื้อ...</option>'; 
                f.innerHTML = '<option value="" disabled selected>เลือกชนิดผ้า...</option>'; 
                res.data.styles.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`); 
                res.data.fabrics.forEach(v => f.innerHTML += `<option value="${v}">${v}</option>`); 
            }); 
        }
    </script>
</body>
</html>
