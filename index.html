<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Factory</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg-color: #000000;
            --card-bg: #1E1E1E;
            --input-bg: #2A2A2A;
            --text-main: #FFFFFF;
            --text-sub: #AAAAAA;
            --brand-grad: linear-gradient(90deg, #FFC805 0%, #FF0080 50%, #00B9F2 100%);
            --accent-color: #FFC805;
        }

        /* --- GLOBAL STYLES --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        h2, h3 { margin-top: 0; }

        /* Branding */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .brand-title {
            font-size: 26px;
            font-weight: bold;
            background: var(--brand-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .brand-subtitle {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* UI Components */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 5px;
            margin-top: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-family: 'Kanit';
            font-size: 16px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #FF0080;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: var(--brand-grad);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.3);
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        /* Utility Classes */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex-row { display: flex; gap: 10px; }
        
        /* Status Badge */
        .status-badge {
            background: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #444;
        }

        /* Loading Spinner */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #FF0080;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: #666; font-size: 12px; margin-top: 15px;">Connecting to Demo Factory...</p>
    </div>

    <div class="brand-header">
        <div class="brand-title">DEMO FACTORY</div>
        <div class="brand-subtitle">Tailor-Made Production System</div>
    </div>

    <div id="viewRegister" class="hidden">
        <div class="card">
            <h2 class="text-center">ลงทะเบียนสมาชิก</h2>
            <p class="text-center" style="color: #aaa; font-size: 14px;">กรุณาระบุข้อมูลเพื่อเริ่มต้นใช้งาน</p>
            
            <label>ชื่อลูกค้า / ชื่อแบรนด์</label>
            <input type="text" id="regName" placeholder="ระบุชื่อของคุณ...">
            
            <label>เบอร์โทรศัพท์ (สำคัญมาก)</label>
            <input type="tel" id="regPhone" placeholder="เช่น 0812345678">
            
            <button class="btn-main" onclick="submitRegister()">ยืนยันการลงทะเบียน</button>
        </div>
    </div>

    <div id="viewAdmin" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="color: var(--accent-color);"><i class="fas fa-user-shield"></i> <span id="adminNameDisplay">Admin</span></span>
            <span style="font-size:10px; background:#333; padding:2px 8px; border-radius:4px;">STAFF MODE</span>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <i class="fas fa-plus-circle"></i> เปิดออเดอร์ใหม่
            </h3>
            
            <form id="createOrderForm">
                <label>เบอร์โทรลูกค้า (เพื่อค้นหา)</label>
                <input type="tel" id="ordPhone" placeholder="กรอกเบอร์ลูกค้า..." required>
                
                <label>รูปแบบเสื้อ (Style)</label>
                <select id="ordStyle" required>
                    <option value="" disabled selected>กำลังโหลดข้อมูล...</option>
                </select>

                <div class="flex-row">
                    <div style="width: 50%;">
                        <label>จำนวน (ตัว)</label>
                        <input type="number" id="ordQty" placeholder="100" required>
                    </div>
                    <div style="width: 50%;">
                        <label>ชนิดผ้า (Fabric)</label>
                        <select id="ordFabric" required>
                            <option value="" disabled selected>กำลังโหลด...</option>
                        </select>
                    </div>
                </div>

                <label>วันกำหนดส่ง (Delivery Date)</label>
                <input type="date" id="ordDate" required>

                <label>รายละเอียดเพิ่มเติม (Detail)</label>
                <textarea id="ordDetail" rows="3" placeholder="เช่น สกรีน 1 จุด, ปักโลโก้อกซ้าย..."></textarea>

                <button type="submit" class="btn-main">บันทึกและแจ้งเตือนลูกค้า</button>
            </form>
        </div>
    </div>

    <div id="viewCustomer" class="hidden">
        <div class="card text-center">
            <h2 id="custNameDisplay" style="color: var(--accent-color);">สวัสดีครับ</h2>
            <p style="color: #aaa; font-size: 14px;">รายการสั่งผลิตของคุณ</p>
        </div>

        <div id="orderListContainer">
            </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // 1. ใส่ URL Web App ที่ได้จาก Google Apps Script (ลงท้ายด้วย /exec)
        const GAS_API = 'https://script.google.com/macros/s/AKfycbxfO1dF1aj7RPoTssyj-eF9QgJ7iPjruVMI0Yl4NMbQEdY8Iv5T6R2P6w2vkv9RzoAhDA/exec'; 
        
        // 2. ใส่ LIFF ID ของคุณ
        const LIFF_ID = '2009142530-l2sIA52W';
        // =================================================

        let userProfile = {};

        // --- INITIALIZATION ---
        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                userProfile = await liff.getProfile();
                checkUserStatus();
            } catch (err) {
                alert("LIFF Init Error: " + err);
            }
        }
        main();

        // --- CORE FUNCTIONS ---

        // 1. ตรวจสอบสถานะ User (ใหม่/เก่า/Admin)
        function checkUserStatus() {
            fetch(GAS_API, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_user', data: { userId: userProfile.userId } })
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById('loader').classList.add('hidden'); // ซ่อน Loading
                
                if (res.found) {
                    // เจอ User -> เช็ค Role
                    if (['Admin', 'Sales', 'PM', 'QC'].includes(res.data.Role)) {
                        showAdmin(res.data);
                    } else {
                        showCustomer(res.data);
                    }
                } else {
                    // ไม่เจอ -> ไปหน้าลงทะเบียน
                    document.getElementById('viewRegister').classList.remove('hidden');
                }
            })
            .catch(err => alert("Connection Error: " + err));
        }

        // 2. ฟังก์ชันหน้า Admin
        function showAdmin(data) {
            document.getElementById('viewAdmin').classList.remove('hidden');
            document.getElementById('adminNameDisplay').innerText = data.RealName;
            
            // ดึงข้อมูล Dropdown จาก Sheet 'Options'
            fetchOptions();

            // Handle Submit Form
            document.getElementById('createOrderForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if(!confirm("ยืนยันการเปิดออเดอร์?")) return;

                // Show loading state on button
                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = "กำลังบันทึก...";
                btn.disabled = true;

                fetch(GAS_API, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'create_order',
                        data: {
                            adminName: data.RealName,
                            phone: document.getElementById('ordPhone').value,
                            style: document.getElementById('ordStyle').value,
                            qty: document.getElementById('ordQty').value,
                            fabric: document.getElementById('ordFabric').value,
                            deliveryDate: document.getElementById('ordDate').value,
                            detail: document.getElementById('ordDetail').value
                        }
                    })
                })
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'success') {
                        alert(`เปิดออเดอร์สำเร็จ! หมายเลข: ${res.orderId}`);
                        document.getElementById('createOrderForm').reset();
                    } else {
                        alert("เกิดข้อผิดพลาด: " + res.message);
                    }
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
            });
        }

        // 3. ฟังก์ชันดึง Options (Style/Fabric)
        function fetchOptions() {
            fetch(GAS_API, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_options' })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    const styles = res.data.styles;
                    const fabrics = res.data.fabrics;
                    
                    const styleSelect = document.getElementById('ordStyle');
                    const fabricSelect = document.getElementById('ordFabric');
                    
                    // Render Style Options
                    styleSelect.innerHTML = '<option value="" disabled selected>เลือกรูปแบบ...</option>';
                    styles.forEach(s => {
                        styleSelect.innerHTML += `<option value="${s}">${s}</option>`;
                    });

                    // Render Fabric Options
                    fabricSelect.innerHTML = '<option value="" disabled selected>เลือกชนิดผ้า...</option>';
                    fabrics.forEach(f => {
                        fabricSelect.innerHTML += `<option value="${f}">${f}</option>`;
                    });
                }
            });
        }

        // 4. ฟังก์ชันหน้า Customer
        function showCustomer(data) {
            document.getElementById('viewCustomer').classList.remove('hidden');
            document.getElementById('custNameDisplay').innerText = "สวัสดีครับ, " + data.RealName;

            // ดึงรายการออเดอร์
            fetch(GAS_API, {
                method: 'POST',
                body: JSON.stringify({ action: 'get_my_orders', data: { userId: userProfile.userId } })
            })
            .then(res => res.json())
            .then(res => {
                const container = document.getElementById('orderListContainer');
                if (res.orders.length === 0) {
                    container.innerHTML = `
                        <div class="card text-center" style="padding:40px;">
                            <i class="fas fa-box-open" style="font-size:40px; color:#333; margin-bottom:10px;"></i>
                            <p style="color:#666;">ยังไม่มีออเดอร์ในขณะนี้</p>
                        </div>`;
                } else {
                    let html = '';
                    res.orders.forEach(order => {
                        html += `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <span style="font-weight:bold; color:var(--accent-color); font-size:18px;">${order.orderNo}</span>
                                <span class="status-badge">${order.status}</span>
                            </div>
                            <div style="font-size:14px; color:#ddd; line-height:1.6;">
                                <div><i class="fas fa-tshirt" style="width:20px;"></i> ${order.style} (${order.qty} ตัว)</div>
                                <div><i class="far fa-calendar-alt" style="width:20px;"></i> กำหนดส่ง: ${order.delivery}</div>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                }
            });
        }

        // 5. ฟังก์ชันลงทะเบียน
        function submitRegister() {
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;

            if (!name || !phone) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            document.getElementById('loader').classList.remove('hidden'); // Show loader

            fetch(GAS_API, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'register',
                    data: {
                        userId: userProfile.userId,
                        displayName: userProfile.displayName,
                        realName: name,
                        phone: phone
                    }
                })
            })
            .then(res => res.json())
            .then(res => {
                alert("ลงทะเบียนเรียบร้อย! ยินดีต้อนรับครับ");
                location.reload(); // รีโหลดเพื่อเข้าหน้า Dashboard
            });
        }
    </script>
</body>
</html>
