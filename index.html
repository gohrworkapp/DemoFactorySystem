<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Demo Factory</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1A1A1A;
            --input-bg: #2A2A2A;
            --text-main: #FFFFFF;
            --brand-grad: linear-gradient(90deg, #FFC805 0%, #FF0080 50%, #00B9F2 100%);
            --accent-color: #FFC805;
            --success-color: #00C851;
            --danger-color: #ff4444;
            --disable-color: #333333;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Kanit', sans-serif; margin: 0; padding: 15px; padding-bottom: 80px;
        }

        .brand-title { font-size: 24px; font-weight: bold; background: var(--brand-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 5px; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .cust-info { font-size: 13px; color: #ddd; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 8px; border-left: 3px solid var(--accent-color); }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--brand-grad); }
        .btn-pm { background: linear-gradient(90deg, #00B9F2, #0055ff); }
        .btn-qc { background: linear-gradient(90deg, #00C851, #007E33); }
        .btn-ship { background: linear-gradient(90deg, #FF0080, #9900CC); }
        .btn-merch { background: linear-gradient(90deg, #FF9800, #F57C00); }
        .btn-reject { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
        .btn-disabled { background: var(--disable-color) !important; color: #777 !important; cursor: not-allowed; border: 1px solid #444 !important; pointer-events: none; }

        /* Inputs */
        .input-label { font-size: 13px; color: var(--accent-color); margin-bottom: 5px; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #444; border-radius: 8px; color: #fff; box-sizing: border-box; font-family: 'Kanit'; font-size: 14px; }
        input[type="file"] { padding: 8px; font-size: 12px; }
        
        /* Filter & Tabs */
        .filter-container { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; color: #666; font-size: 16px; font-weight: bold; padding: 5px 10px; cursor: pointer; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

        /* Dashboard Stats */
        .dashboard-stats { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .stat-box { background: #252525; border: 1px solid #333; border-radius: 8px; min-width: 85px; padding: 12px; text-align: center; flex: 1; }
        .stat-num { font-size: 22px; font-weight: bold; color: var(--accent-color); }
        .stat-label { font-size: 11px; color: #aaa; white-space: nowrap; }

        /* Progress Bar (Timeline) */
        .stepper-wrapper { display: flex; justify-content: space-between; margin-top: 15px; position: relative; }
        .stepper-item { position: relative; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stepper-item::before { content: ""; position: absolute; top: 7px; left: -50%; width: 100%; height: 2px; background: #444; z-index: 1; }
        .stepper-item:first-child::before { content: none; }
        .stepper-item.active::before { background: var(--success-color); }
        .step-counter { z-index: 2; width: 14px; height: 14px; border-radius: 50%; background: #444; border: 2px solid #222;}
        .stepper-item.active .step-counter { background: var(--success-color); box-shadow: 0 0 5px var(--success-color); border-color: var(--success-color);}
        .step-name { margin-top: 5px; font-size: 9px; color: #666; text-align: center; line-height: 1.2; }
        .stepper-item.active .step-name { color: #fff; font-weight: bold; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal.show { display: flex; }
        .modal-content { width: 100%; max-width: 400px; background: #222; padding: 20px; border-radius: 12px; border: 1px solid #444; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .status-badge { background:#333; padding:4px 8px; border-radius:6px; font-size:11px; color:var(--accent-color); border:1px solid #555; text-align: right; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--accent-color)"></i><div style="font-size:12px; color:#aaa; margin-top:10px;">กำลังประมวลผล...</div></div>

    <div class="brand-title">DEMO FACTORY</div>
    <div style="text-align:center; color:#666; font-size:12px; margin-bottom:20px;">Smart Production System</div>

    <div id="viewRegister" class="hidden">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">ลงทะเบียนลูกค้า</h3>
            <label class="input-label">ชื่อลูกค้า / ชื่อแบรนด์</label>
            <input type="text" id="regName" placeholder="ระบุชื่อของคุณ...">
            <label class="input-label">เบอร์โทรศัพท์ (สำคัญมาก)</label>
            <input type="tel" id="regPhone" placeholder="เช่น 0812345678">
            <button class="btn btn-main" onclick="register()">ยืนยันการลงทะเบียน</button>
        </div>
    </div>

    <div id="viewStaff" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#222; padding:12px; border-radius:8px;">
            <span><i class="fas fa-user-circle" style="color:var(--accent-color); font-size:18px;"></i> <span id="staffName" style="font-weight:bold; margin-left:5px;">User</span></span>
            <span id="staffRole" style="font-size:11px; color:#aaa; background:#111; padding:4px 8px; border-radius:4px; border:1px solid #444;">ROLE</span>
        </div>

        <div class="filter-container">
            <input type="text" id="staffSearch" placeholder="🔍 ค้นหา ชื่อลูกค้า, เบอร์, Batch, Order No..." onkeyup="filterStaffList()">
            <select id="staffStatusFilter" onchange="filterStaffList()">
                <option value="ACTIVE">งานที่กำลังดำเนินการ</option>
                <option value="ALL">งานทั้งหมด</option>
                <option value="Correction Needed">งานต้องแก้ไข</option>
                <option value="Order Confirmation">1. ยืนยันออเดอร์</option>
                <option value="Work Order Review Stage">2. ตรวจสอบ Work Order</option>
                <option value="Sampling Stage">3. งานตัวอย่าง</option>
                <option value="Pre-Production Approved">4. อนุมัติแบบ</option>
                <option value="Bulk Production">5. กำลังผลิต</option>
                <option value="Quality Control">6. ตรวจสอบคุณภาพ</option>
                <option value="Shipped">7. จัดส่งแล้ว</option>
            </select>
        </div>

        <div id="adminPanel" class="hidden">
            <button class="btn" style="background:#333; border:1px solid #555; margin-bottom:15px;" onclick="document.getElementById('createOrderForm').classList.toggle('hidden')">
                <i class="fas fa-file-invoice"></i> + สร้างคำสั่งซื้อใหม่
            </button>
            
            <div id="createOrderForm" class="card hidden">
                <h4 style="margin-top:0; color:var(--accent-color); border-bottom:1px solid #333; padding-bottom:10px;">เปิดออเดอร์ใหม่ (Sales Order)</h4>
                
                <label class="input-label">1. เบอร์โทรลูกค้า (เพื่อค้นหาประวัติ)</label>
                <input type="tel" id="ordPhone" placeholder="08x-xxx-xxxx">
                
                <label class="input-label">2. Batch / Lot Reference (เลขใบเสนอราคา/ล็อต)</label>
                <input type="text" id="ordBatch" placeholder="เช่น QT2026-001">

                <div class="flex-row">
                    <div style="width:50%">
                        <label class="input-label">3. ทรงเสื้อ (Style)</label>
                        <select id="ordStyle"><option>Loading...</option></select>
                    </div>
                    <div style="width:50%">
                        <label class="input-label">4. จำนวน (Qty)</label>
                        <input type="number" id="ordQty" placeholder="100">
                    </div>
                </div>

                <label class="input-label">5. ชนิดผ้า (Fabric Reference)</label>
                <select id="ordFabric"><option>Loading...</option></select>

                <label class="input-label">6. วันที่กำหนดส่งมอบ (Est. Delivery)</label>
                <input type="date" id="ordDate">

                <label class="input-label">7. ที่อยู่จัดส่ง (Shipping Address)</label>
                <textarea id="ordAddress" rows="2" placeholder="บ้านเลขที่, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>

                <label class="input-label">8. รายละเอียดเพิ่มเติม (Detail)</label>
                <textarea id="ordDetail" rows="2" placeholder="จุดสกรีน, ขนาดโลโก้, ตำแหน่งปัก..."></textarea>

                <button class="btn btn-main" style="margin-top:15px;" onclick="createOrder()">บันทึกและแจ้งเตือนลูกค้า</button>
            </div>
        </div>

        <div id="staffTaskList">Loading tasks...</div>
    </div>

    <div id="viewCustomer" class="hidden">
        <div style="background:#222; padding:15px; border-radius:12px; margin-bottom:15px; text-align:center; border: 1px solid #444;">
            <i class="fas fa-user-circle fa-2x" style="color:var(--accent-color); margin-bottom:5px;"></i>
            <h3 style="margin:0; color:#fff;" id="custHeaderName">สวัสดีครับ</h3>
        </div>
        
        <div class="tab-container" style="justify-content: center; border:none;">
            <button class="tab-btn active" onclick="switchCustTab('list')">รายการออเดอร์</button>
            <button class="tab-btn" onclick="switchCustTab('dashboard')">ภาพรวม (Dashboard)</button>
        </div>

        <div id="custListView"><div id="customerOrderList">Loading...</div></div>
        
        <div id="custDashView" class="hidden">
            <div class="dashboard-stats">
                <div class="stat-box"><div class="stat-num" id="stat-confirm">0</div><div class="stat-label">ยืนยันแล้ว</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-prod">0</div><div class="stat-label">กำลังผลิต</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-done" style="color:var(--success-color)">0</div><div class="stat-label">ส่งมอบแล้ว</div></div>
            </div>
            <p style="text-align:center; color:#666; font-size:12px; margin-top:20px;">ขอบคุณที่ไว้วางใจใช้บริการ Demo Factory</p>
        </div>
    </div>

    <div id="modalFeedback" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--danger-color); margin-top:0;"><i class="fas fa-exclamation-triangle"></i> แจ้งแก้ไข / ตีกลับงาน</h3>
            <label class="input-label">ระบุสาเหตุที่ต้องแก้ไข</label>
            <input type="hidden" id="fbOrderNo">
            <textarea id="fbReason" rows="4" placeholder="ระบุจุดที่ต้องแก้ไขให้ชัดเจน เพื่อให้ Merchandiser ดำเนินการ..."></textarea>
            <div class="flex-row" style="margin-top:15px;">
                <button class="btn" style="background:#444;" onclick="closeModal()">ยกเลิก</button>
                <button class="btn" style="background:var(--danger-color);" onclick="confirmRollback()">ยืนยันการส่งกลับ</button>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        // *** ใส่ URL Web App ของคุณที่นี่ ***
        const GAS_API = 'https://script.google.com/macros/s/AKfycby36VokKZp2ekFU7llJ5jOSPEAgpt3oypZq7tvznf7N-oH6RPLgsLKP0fJaDnvL0Ku1Wg/exec'; 
        const LIFF_ID = '2009142530-l2sIA52W';
        // =================================================

        let userProfile = {};
        let currentUserRole = '';
        let globalOrders = [];

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                userProfile = await liff.getProfile();
                checkUser();
            } catch(e) { alert("LIFF Init Error: กรุณาตรวจสอบ LIFF ID"); }
        }
        main();

        function checkUser() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_user', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                document.getElementById('loader').classList.add('hidden');
                if (res.found) {
                    currentUserRole = res.data.Role;
                    // ตรวจสอบชื่อ Role แบบเต็ม
                    if (['Admin', 'Sales Admin', 'Production Manager', 'Quality Control', 'Merchandiser'].includes(currentUserRole)) {
                        showStaffDashboard(res.data);
                    } else {
                        showCustomerView(res.data);
                    }
                } else {
                    document.getElementById('viewRegister').classList.remove('hidden');
                }
            });
        }

        // --- Helper: Convert Image to Base64 (พร้อมฟังก์ชันย่อขนาดรูป ลดปัญหาส่งไฟล์ไม่ผ่าน) ---
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // กำหนดความกว้างสูงสุด 800px 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // บีบอัดเป็น JPEG (ช่วยลดขนาดไฟล์ ทำให้ส่งเข้า Drive ได้ฉลุย)
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                        resolve(compressedBase64);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        let preloadedImages = {}; // ตัวแปรเก็บรูปที่ประมวลผลเสร็จแล้ว

        // ฟังก์ชันประมวลผลภาพและแสดงสถานะให้ User ทราบ
        async function processImage(input, orderNo, type) {
            const btnId = type === 's' ? `btn-s-${orderNo}` : `btn-ship-${orderNo}`;
            const statusId = type === 's' ? `status-s-${orderNo}` : `status-ship-${orderNo}`;
            const btn = document.getElementById(btnId);
            const status = document.getElementById(statusId);
            const key = `${type}-${orderNo}`;

            if (input.files.length > 0) {
                // 1. ล็อกปุ่มกด และโชว์ข้อความกำลังโหลด
                btn.classList.add('btn-disabled');
                btn.disabled = true;
                status.style.display = 'block';
                status.style.color = 'var(--accent-color)';
                status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังประมวลผลภาพ กรุณารอสักครู่...';

                try {
                    // 2. เริ่มย่อขนาดและแปลงภาพ
                    const base64 = await getBase64(input.files[0]);
                    preloadedImages[key] = base64; // เก็บรูปลงหน่วยความจำ
                    
                    // 3. ปลดล็อกปุ่ม และแจ้งว่าพร้อมส่ง
                    status.style.color = 'var(--success-color)';
                    status.innerHTML = '<i class="fas fa-check-circle"></i> ภาพพร้อมส่งแล้ว กดทำรายการต่อได้เลย';
                    btn.classList.remove('btn-disabled');
                    btn.disabled = false;
                } catch (e) {
                    status.style.color = 'var(--danger-color)';
                    status.innerHTML = '<i class="fas fa-times-circle"></i> เกิดข้อผิดพลาด กรุณาเลือกรูปใหม่';
                    btn.classList.remove('btn-disabled');
                    btn.disabled = false;
                }
            } else {
                status.style.display = 'none';
                delete preloadedImages[key];
            }
        }

        // --- STAFF SECTION ---
        function showStaffDashboard(data) {
            document.getElementById('viewStaff').classList.remove('hidden');
            document.getElementById('staffName').innerText = data.RealName;
            document.getElementById('staffRole').innerText = data.Role;

            if (data.Role === 'Sales Admin' || data.Role === 'Admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                fetchOptions();
            }
            fetchStaffData();
        }

        function fetchStaffData() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_all_orders' }) })
            .then(r => r.json()).then(res => {
                globalOrders = res.orders;
                document.getElementById('staffStatusFilter').value = "ACTIVE"; // ค่าเริ่มต้น
                filterStaffList();
            });
        }

        function filterStaffList() {
            const keyword = document.getElementById('staffSearch').value.toLowerCase();
            const statusFilter = document.getElementById('staffStatusFilter').value;
            const list = document.getElementById('staffTaskList');
            
            let filtered = globalOrders;

            // 1. กรองด้วย Status
            if (statusFilter === 'ACTIVE') {
                filtered = filtered.filter(o => o.status !== 'Shipped'); // ซ่อนงานที่จบแล้ว
            } else if (statusFilter !== 'ALL') {
                filtered = filtered.filter(o => o.status.includes(statusFilter));
            }

            // 2. กรองด้วย Keyword (Search)
            if (keyword) {
                filtered = filtered.filter(o => 
                    o.orderNo.toLowerCase().includes(keyword) || 
                    (o.custName && o.custName.toLowerCase().includes(keyword)) ||
                    (o.custPhone && o.custPhone.includes(keyword)) ||
                    (o.batch && o.batch.toLowerCase().includes(keyword))
                );
            }

            if (filtered.length === 0) { list.innerHTML = '<div class="card text-center" style="color:#666; padding:30px;">ไม่พบรายการงานที่ตรงกับเงื่อนไข</div>'; return; }

            let html = '';
            filtered.forEach(o => {
                let btns = '';
                
                // ฟังก์ชันเช็คว่าขั้นตอนผ่านไปหรือยัง
                const isPassed = (current, target) => {
                    const steps = [
                        'Order Confirmation', 
                        'Work Order Review Stage', 
                        'Sampling Stage', 
                        'Pre-Production Approved', 
                        'Bulk Production (50%)', 
                        'Quality Control Passed', 
                        'Shipped'
                    ];
                    return steps.indexOf(current) >= steps.indexOf(target);
                };

                // ข้อมูลลูกค้าแบบย่อ
                const custInfo = `
                    <div class="cust-info">
                        <div style="font-size:14px; margin-bottom:5px;">👤 <b>${o.custName}</b> <a href="tel:${o.custPhone}" style="color:var(--accent-color); text-decoration:none; margin-left:10px;"><i class="fas fa-phone"></i> ${o.custPhone}</a></div>
                        <div style="font-size:12px; color:#aaa; border-top:1px dashed #444; padding-top:5px;">📍 <b>จัดส่ง:</b> ${o.address || '-'}</div>
                    </div>`;

                // --- กรณีติดปัญหา (Correction Needed) ---
                if (o.status === 'Correction Needed') {
                    if (currentUserRole === 'Merchandiser' || currentUserRole === 'Admin') {
                        html += `<div class="card" style="border:1px solid var(--danger-color)">
                            <div class="card-header"><strong style="color:var(--danger-color)">⚠ ต้องแก้ไข (${o.orderNo})</strong><span class="status-badge" style="background:var(--danger-color)">Fix Needed</span></div>
                            ${custInfo}
                            <p style="font-size:13px; color:#fff; background:#333; padding:10px; border-radius:6px; border-left:3px solid var(--danger-color);"><b>สาเหตุที่ต้องแก้:</b> ${o.feedback}</p>
                            <button class="btn" style="background:var(--success-color);" onclick="updateStatus('${o.orderNo}', 'SUBMIT_FIX')"><i class="fas fa-check-circle"></i> แก้ไขเสร็จสิ้น (ส่ง QC ตรวจใหม่)</button>
                        </div>`;
                    } else {
                        html += `<div class="card" style="border:1px solid var(--danger-color)">
                            <div class="card-header"><strong style="color:var(--danger-color)">⚠ รอ Merchandiser แก้ไข (${o.orderNo})</strong></div>
                            <p style="font-size:12px; color:#aaa;">เหตุผลการตีกลับ: ${o.feedback}</p>
                        </div>`;
                    }
                    return; // ข้ามการวาดการ์ดปกติไปเลย
                }

                // --- ปุ่มสำหรับ Production Manager ---
                if (currentUserRole === 'Production Manager' || currentUserRole === 'Admin') {
                    if (isPassed(o.status, 'Work Order Review Stage')) {
                        btns += `<button class="btn btn-disabled"><i class="fas fa-check"></i> ตรวจสอบ WO แล้ว</button>`;
                    } else {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'WO_APPROVE')"><i class="fas fa-clipboard-check"></i> อนุมัติ Work Order</button>`;
                    }
                    
                    if (isPassed(o.status, 'Bulk Production (50%)')) {
                        btns += `<button class="btn btn-disabled"><i class="fas fa-check"></i> อัปเดตผลิต 50% แล้ว</button>`;
                    } else if (isPassed(o.status, 'Pre-Production Approved')) {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'UPDATE_50')"><i class="fas fa-bolt"></i> แจ้งผลิตเสร็จ 50%</button>`;
                    }
                }

                // --- ปุ่มสำหรับ Merchandiser ---
                if (currentUserRole === 'Merchandiser' || currentUserRole === 'Admin') {
                    if (isPassed(o.status, 'Sampling Stage')) {
                        btns += `<button class="btn btn-disabled"><i class="fas fa-check"></i> ส่งตัวอย่างแล้ว</button>`;
                    } else if (isPassed(o.status, 'Work Order Review Stage')) {
                        btns += `<div style="background:#222; padding:10px; border-radius:8px; margin-top:8px;">
                            <input type="text" id="track-s-${o.orderNo}" placeholder="ระบุ Tracking ตัวอย่าง" style="font-size:13px; margin-bottom:5px;">
                            <label style="font-size:12px; color:#aaa;">แนบสลิป/หลักฐานส่งของ:</label>
                            <input type="file" id="img-s-${o.orderNo}" accept="image/*" onchange="processImage(this, '${o.orderNo}', 's')">
                            <div id="status-s-${o.orderNo}" style="font-size:12px; margin-top:5px; display:none;"></div>
                            <button class="btn btn-merch" id="btn-s-${o.orderNo}" style="margin-top:8px;" onclick="sendSample('${o.orderNo}')"><i class="fas fa-box"></i> แจ้งส่งตัวอย่าง</button>
                        </div>`;
                    }

                    if (isPassed(o.status, 'Pre-Production Approved')) {
                        btns += `<button class="btn btn-disabled"><i class="fas fa-check"></i> ลูกค้าอนุมัติแบบแล้ว</button>`;
                    } else if(isPassed(o.status, 'Sampling Stage')) {
                        btns += `<button class="btn btn-qc" onclick="updateStatus('${o.orderNo}', 'PP_APPROVE')"><i class="fas fa-thumbs-up"></i> ยืนยันลูกค้าอนุมัติ (PP)</button>`;
                    }
                }

                // --- ปุ่มสำหรับ Quality Control ---
                if (currentUserRole === 'Quality Control' || currentUserRole === 'Admin') {
                    if (isPassed(o.status, 'Quality Control Passed')) {
                        btns += `<button class="btn btn-disabled"><i class="fas fa-check"></i> ผ่านการตรวจ QC แล้ว</button>`;
                    } else if(isPassed(o.status, 'Bulk Production (50%)')) {
                        btns += `<div class="flex-row">
                            <button class="btn btn-qc" style="flex:2;" onclick="updateStatus('${o.orderNo}', 'QC_PASS')"><i class="fas fa-check-circle"></i> ให้ผ่าน QC</button>
                            <button class="btn btn-reject" style="flex:1;" onclick="openFeedback('${o.orderNo}')"><i class="fas fa-undo"></i> ตีกลับ</button>
                        </div>`;
                    }
                }

                // --- ปุ่มสำหรับ Sales Admin ---
                if (currentUserRole === 'Sales Admin' || currentUserRole === 'Admin') {
                    if (o.status !== 'Shipped' && isPassed(o.status, 'Quality Control Passed')) {
                        btns += `<div style="background:#222; padding:10px; border-radius:8px; margin-top:8px;">
                            <input type="text" id="track-${o.orderNo}" placeholder="ระบุ Tracking สินค้าจริง" style="font-size:13px; margin-bottom:5px;">
                            <label style="font-size:12px; color:#aaa;">แนบสลิป/หลักฐานส่งของ:</label>
                            <input type="file" id="img-${o.orderNo}" accept="image/*" onchange="processImage(this, '${o.orderNo}', 'ship')">
                            <div id="status-ship-${o.orderNo}" style="font-size:12px; margin-top:5px; display:none;"></div>
                            <button class="btn btn-ship" id="btn-ship-${o.orderNo}" style="margin-top:8px;" onclick="shipOrder('${o.orderNo}')"><i class="fas fa-shipping-fast"></i> ยืนยันจัดส่งลูกค้า</button>
                        </div>`;
                    } else if (o.status === 'Shipped') {
                        btns += `<div style="margin-top:10px; font-size:13px; color:var(--success-color); text-align:center; background:#111; padding:8px; border-radius:6px;">✔ จัดส่งสำเร็จแล้ว (Track: ${o.tracking || '-'})</div>`;
                    }
                }

                // การแสดงรูปลิงก์ที่อัปโหลดไว้แล้ว
                let extraImages = '';
                if(o.sampleImage && o.sampleImage !== '-') {
                    extraImages += `<br><a href="${o.sampleImage}" target="_blank" style="color:var(--accent-color); font-size:11px; text-decoration:none;"><i class="fas fa-image"></i> รูปตัวอย่างพัสดุ</a>`;
                }
                if(o.shipImage && o.shipImage !== '-') {
                    extraImages += `<br><a href="${o.shipImage}" target="_blank" style="color:var(--accent-color); font-size:11px; text-decoration:none;"><i class="fas fa-image"></i> รูปพัสดุจัดส่ง</a>`;
                }

                // การ์ดหลัก
                html += `
                <div class="card">
                    <div class="card-header">
                        <strong style="color:var(--accent-color); font-size:16px;">${o.orderNo}</strong>
                        <span class="status-badge">${o.status}</span>
                    </div>
                    ${custInfo}
                    <div style="font-size:13px; color:#ccc; display:flex; justify-content:space-between; line-height:1.6;">
                        <div>
                            ทรงเสื้อ: <span style="color:#fff;">${o.style}</span><br>
                            จำนวน: <span style="color:#fff;">${o.qty} ตัว</span><br>
                            Batch: <span style="color:#fff;">${o.batch || '-'}</span>
                        </div>
                        <div style="text-align:right;">
                            ส่งมอบ: <span style="color:#fff;">${o.delivery}</span><br>
                            <span style="font-size:11px; color:#666;">อัปเดต: ${o.updatedDate}</span>
                            ${extraImages}
                        </div>
                    </div>
                    ${btns}
                </div>`;
            });
            list.innerHTML = html;
        }

        // --- CUSTOMER SECTION ---
        function showCustomerView(data) {
            document.getElementById('viewCustomer').classList.remove('hidden');
            document.getElementById('custHeaderName').innerText = "คุณ " + data.RealName;
            
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_my_orders', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                let confirm = 0, prod = 0, done = 0;
                res.orders.forEach(o => {
                    if(o.status === 'Shipped') done++;
                    else if(o.status === 'Order Confirmation') confirm++;
                    else prod++;
                });
                document.getElementById('stat-confirm').innerText = confirm;
                document.getElementById('stat-prod').innerText = prod;
                document.getElementById('stat-done').innerText = done;

                const list = document.getElementById('customerOrderList');
                if (res.orders.length === 0) { list.innerHTML = '<div class="card text-center" style="color:#666; padding:30px;">คุณยังไม่มีรายการสั่งผลิต</div>'; return; }
                list.innerHTML = res.orders.map(o => renderCustCard(o)).join('');
            });
        }

        function switchCustTab(tab) {
            document.querySelectorAll('#viewCustomer .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'list') {
                document.getElementById('custListView').classList.remove('hidden');
                document.getElementById('custDashView').classList.add('hidden');
            } else {
                document.getElementById('custListView').classList.add('hidden');
                document.getElementById('custDashView').classList.remove('hidden');
            }
        }

        function renderCustCard(o) {
            const steps = [
                { label: 'รับออเดอร์', active: true }, 
                { label: 'เตรียมงาน', active: ['Work Order Review Stage', 'Sampling Stage', 'Pre-Production Approved', 'Bulk Production (50%)', 'Quality Control Passed', 'Shipped'].includes(o.status) },
                { label: 'กำลังผลิต', active: ['Bulk Production (50%)', 'Quality Control Passed', 'Shipped'].includes(o.status) },
                { label: 'ตรวจสอบ', active: ['Quality Control Passed', 'Shipped'].includes(o.status) },
                { label: 'ส่งมอบ', active: ['Shipped'].includes(o.status) }
            ];

            let progressHtml = '<div class="stepper-wrapper">';
            steps.forEach(s => { 
                progressHtml += `<div class="stepper-item ${s.active ? 'active' : ''}"><div class="step-counter"></div><div class="step-name">${s.label}</div></div>`; 
            });
            progressHtml += '</div>';

            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong style="color:var(--accent-color); font-size:16px;">${o.orderNo}</strong>
                        <span class="status-badge">${o.status}</span>
                    </div>
                    <div style="font-size:14px; color:#ddd; background:#222; padding:10px; border-radius:8px;">
                        👕 <b>${o.style}</b> (${o.qty} ตัว)<br>
                        📅 กำหนดส่ง: <span style="color:#fff">${o.delivery}</span>
                    </div>
                    ${progressHtml}
                </div>`;
        }

        // --- ACTIONS ---
        function openFeedback(no) { document.getElementById('fbOrderNo').value = no; document.getElementById('modalFeedback').classList.add('show'); }
        function closeModal() { document.getElementById('modalFeedback').classList.remove('show'); }
        function confirmRollback() { 
            const no = document.getElementById('fbOrderNo').value;
            const reason = document.getElementById('fbReason').value;
            if(!reason) return alert("กรุณาระบุสาเหตุที่ต้องแก้ไขให้ชัดเจน"); 
            callApi({ orderNo: no, actionType: 'ROLLBACK', reason: reason, staffName: document.getElementById('staffName').innerText }); 
            closeModal(); 
        }
        
        function updateStatus(no, action) { if(!confirm('ยืนยันการบันทึกสถานะ?')) return; callApi({ orderNo: no, actionType: action, staffName: document.getElementById('staffName').innerText }); }
        
        // ส่งตัวอย่าง (อัปโหลดรูป)
        async function sendSample(no) { 
            const t = document.getElementById(`track-s-${no}`).value; 
            if(!t) return alert("กรุณาระบุเลข Tracking ของพัสดุตัวอย่าง"); 
            
            let base64Img = preloadedImages[`s-${no}`] || null; // ดึงรูปที่แปลงรอไว้มาใช้เลย
            document.getElementById('loader').classList.remove('hidden');
            callApi({ orderNo: no, actionType: 'SEND_SAMPLE', tracking: t, image: base64Img, staffName: document.getElementById('staffName').innerText }); 
        }
        
        // ส่งสินค้าจริง (อัปโหลดรูป)
        async function shipOrder(no) { 
            const t = document.getElementById(`track-${no}`).value; 
            if(!t) return alert("กรุณาระบุเลข Tracking สินค้าจริง"); 

            let base64Img = preloadedImages[`ship-${no}`] || null; // ดึงรูปที่แปลงรอไว้มาใช้เลย
            document.getElementById('loader').classList.remove('hidden');
            callApi({ orderNo: no, actionType: 'SHIP', tracking: t, image: base64Img, staffName: document.getElementById('staffName').innerText }); 
        }
        
        function callApi(payload) { 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'update_status', data: payload }) })
            .then(r => r.json()).then(res => { 
                document.getElementById('loader').classList.add('hidden'); 
                if (res.status === 'success') { alert("บันทึกสำเร็จ!"); fetchStaffData(); } 
                else alert("Error: " + res.message); 
            }).catch(e => {
                document.getElementById('loader').classList.add('hidden'); 
                alert("การอัปโหลดไฟล์อาจใช้เวลาสักครู่ กรุณารีเฟรชหน้าจอ");
            }); 
        }
        
        function register() { 
            const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value; 
            if(!n || !p) return alert("กรุณากรอกข้อมูลให้ครบถ้วน"); 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'register', data: { userId: userProfile.userId, displayName: userProfile.displayName, realName: n, phone: p } }) })
            .then(() => location.reload()); 
        }
        
        function createOrder() { 
            const payload = {
                adminName: document.getElementById('staffName').innerText,
                phone: document.getElementById('ordPhone').value,
                batch: document.getElementById('ordBatch').value,
                style: document.getElementById('ordStyle').value,
                qty: document.getElementById('ordQty').value,
                fabric: document.getElementById('ordFabric').value,
                deliveryDate: document.getElementById('ordDate').value,
                address: document.getElementById('ordAddress').value,
                detail: document.getElementById('ordDetail').value
            };
            if(!payload.phone || !payload.batch || !payload.address) return alert("กรุณากรอก เบอร์โทรลูกค้า, Batch และ ที่อยู่จัดส่ง ให้ครบถ้วน"); 
            document.getElementById('loader').classList.remove('hidden'); 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'create_order', data: payload }) })
            .then(r => r.json()).then(res => { 
                document.getElementById('loader').classList.add('hidden'); 
                if(res.status==='success') { 
                    alert("เปิดออเดอร์เรียบร้อย และระบบได้ส่งแจ้งเตือนหาลูกค้าแล้ว!"); 
                    fetchStaffData(); 
                    document.getElementById('createOrderForm').classList.add('hidden'); 
                    document.getElementById('staffStatusFilter').value = "ACTIVE";
                } 
                else alert("เกิดข้อผิดพลาด: " + res.message); 
            }); 
        }
        
        function fetchOptions() { 
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_options' }) })
            .then(r => r.json()).then(res => { 
                const s = document.getElementById('ordStyle'), f = document.getElementById('ordFabric'); 
                s.innerHTML = '<option value="" disabled selected>เลือกทรงเสื้อ...</option>'; 
                f.innerHTML = '<option value="" disabled selected>เลือกชนิดผ้า...</option>'; 
                res.data.styles.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`); 
                res.data.fabrics.forEach(v => f.innerHTML += `<option value="${v}">${v}</option>`); 
            }); 
        }
    </script>
</body>
</html>
