<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Factory</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1E1E1E;
            --input-bg: #2A2A2A;
            --text-main: #FFFFFF;
            --text-sub: #AAAAAA;
            --brand-grad: linear-gradient(90deg, #FFC805 0%, #FF0080 50%, #00B9F2 100%);
            --accent-color: #FFC805;
            --success-color: #00C851;
            --danger-color: #ff4444;
            --disable-color: #555555;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }

        /* UI Components */
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-title {
            font-size: 24px; font-weight: bold;
            background: var(--brand-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .card {
            background: var(--card-bg); border-radius: 12px; padding: 15px;
            margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Buttons */
        .btn {
            width: 100%; padding: 10px; border: none; border-radius: 8px;
            color: white; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 14px;
            transition: 0.2s;
        }
        .btn-main { background: var(--brand-grad); }
        .btn-pm { background: linear-gradient(90deg, #00B9F2, #0055ff); }
        .btn-qc { background: linear-gradient(90deg, #00C851, #007E33); }
        .btn-ship { background: linear-gradient(90deg, #FF0080, #9900CC); }
        .btn-merch { background: linear-gradient(90deg, #FF9800, #F57C00); }
        .btn-reject { background: transparent; border: 1px solid var(--danger-color); color: var(--danger-color); }
        
        /* Disabled Button Style */
        .btn-disabled {
            background: var(--disable-color) !important;
            color: #888 !important;
            cursor: not-allowed;
            border: 1px solid #444 !important;
            box-shadow: none;
        }

        /* Form Inputs & Labels */
        .input-label { font-size: 13px; color: var(--accent-color); margin-bottom: 5px; display: block; margin-top:10px; }
        input, select, textarea {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid #444; border-radius: 8px; color: #fff;
            box-sizing: border-box; font-family: 'Kanit'; margin-bottom: 5px;
        }

        /* Stats & Dashboard */
        .dashboard-stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-box {
            background: #252525; border: 1px solid #333; border-radius: 8px;
            padding: 15px; text-align: center; flex: 1;
        }
        .stat-num { font-size: 24px; font-weight: bold; color: var(--accent-color); }
        .stat-label { font-size: 12px; color: #aaa; }

        /* Tabs System */
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn {
            background: transparent; border: none; color: #666; font-size: 16px; font-weight: bold;
            padding: 5px 10px; cursor: pointer;
        }
        .tab-btn.active { color: var(--accent-color); border-bottom: 2px solid var(--accent-color); }

        /* Progress Bar */
        .stepper-wrapper { display: flex; justify-content: space-between; margin-top: 20px; position: relative; }
        .stepper-item { position: relative; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .stepper-item::before {
            content: ""; position: absolute; top: 7px; left: -50%; width: 100%; height: 2px;
            background: #444; z-index: 1;
        }
        .stepper-item:first-child::before { content: none; }
        .stepper-item.active::before { background: var(--success-color); }
        .step-counter {
            z-index: 2; width: 15px; height: 15px; border-radius: 50%; background: #444;
        }
        .stepper-item.active .step-counter { background: var(--success-color); box-shadow: 0 0 5px var(--success-color); }
        .step-name { margin-top: 5px; font-size: 10px; color: #666; text-align: center; }
        .stepper-item.active .step-name { color: #fff; font-weight: bold; }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 999; display: none;
            justify-content: center; align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content { width: 85%; max-width: 320px; background: #222; padding: 20px; border-radius: 12px; border: 1px solid #444; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .status-badge { background:#333; padding:2px 8px; border-radius:4px; font-size:10px; color:#fff; border:1px solid #555; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--accent-color)"></i></div>

    <div class="brand-header">
        <div class="brand-title">DEMO FACTORY</div>
        <small style="color:#666;">Smart Production System</small>
    </div>

    <div id="viewRegister" class="hidden">
        <div class="card">
            <h3 style="text-align:center;">ลงทะเบียนสมาชิก</h3>
            <label class="input-label">ชื่อลูกค้า / ชื่อแบรนด์</label>
            <input type="text" id="regName" placeholder="ระบุชื่อของคุณ...">
            <label class="input-label">เบอร์โทรศัพท์ (สำคัญมาก)</label>
            <input type="tel" id="regPhone" placeholder="เช่น 0812345678">
            <button class="btn btn-main" onclick="register()">ยืนยันลงทะเบียน</button>
        </div>
    </div>

    <div id="viewStaff" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span><i class="fas fa-user-circle" style="font-size:20px; color:var(--accent-color);"></i> <span id="staffName">User</span></span>
            <span id="staffRole" class="status-badge">ROLE</span>
        </div>

        <div id="adminTabs" class="tab-container hidden">
            <button class="tab-btn active" onclick="switchAdminTab('active')">งานปัจจุบัน</button>
            <button class="tab-btn" onclick="switchAdminTab('history')">ประวัติ (History)</button>
        </div>

        <div style="margin-bottom: 15px;">
            <input type="text" id="staffFilter" placeholder="🔍 ค้นหาสถานะ หรือ เลขออเดอร์..." onkeyup="filterStaffList()">
        </div>

        <div id="adminPanel" class="hidden">
            <button class="btn" style="background:#333; border:1px solid #555; margin-bottom:15px;" onclick="document.getElementById('createOrderForm').classList.toggle('hidden')">
                <i class="fas fa-plus"></i> เปิดออเดอร์ใหม่
            </button>
            <div id="createOrderForm" class="card hidden">
                <h4 style="margin-top:0; color:var(--accent-color);">สร้างคำสั่งซื้อใหม่</h4>
                
                <label class="input-label">เบอร์โทรลูกค้า (เพื่อเชื่อมข้อมูล)</label>
                <input type="tel" id="ordPhone" placeholder="08x-xxx-xxxx">
                
                <label class="input-label">ทรงเสื้อ / รูปแบบ (Style)</label>
                <select id="ordStyle"><option>Loading...</option></select>

                <div class="flex-row">
                    <div style="width:50%">
                        <label class="input-label">จำนวน (ตัว)</label>
                        <input type="number" id="ordQty" placeholder="100">
                    </div>
                    <div style="width:50%">
                        <label class="input-label">ชนิดผ้า (Fabric)</label>
                        <select id="ordFabric"><option>Loading...</option></select>
                    </div>
                </div>

                <label class="input-label">วันที่ส่งมอบ (Delivery Date)</label>
                <input type="date" id="ordDate">

                <label class="input-label">รายละเอียดเพิ่มเติม (Detail)</label>
                <textarea id="ordDetail" rows="2" placeholder="เช่น สกรีน 1 จุด, ปักอกซ้าย..."></textarea>

                <button class="btn btn-main" onclick="createOrder()">บันทึกออเดอร์</button>
            </div>
        </div>

        <div id="staffTaskList">Loading...</div>
    </div>

    <div id="viewCustomer" class="hidden">
        <h3 style="color:var(--accent-color); text-align:center; margin-bottom:5px;" id="custHeaderName">สวัสดีครับ</h3>
        
        <div class="tab-container" style="justify-content: center; border:none;">
            <button class="tab-btn active" onclick="switchCustTab('list')">รายการออเดอร์</button>
            <button class="tab-btn" onclick="switchCustTab('dashboard')">ภาพรวม (Dashboard)</button>
        </div>

        <div id="custListView">
            <div id="customerOrderList">Loading...</div>
        </div>

        <div id="custDashView" class="hidden">
            <div class="dashboard-stats">
                <div class="stat-box"><div class="stat-num" id="stat-confirm">0</div><div class="stat-label">ยืนยันแล้ว</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-prod">0</div><div class="stat-label">กำลังผลิต</div></div>
                <div class="stat-box"><div class="stat-num" id="stat-done" style="color:var(--success-color)">0</div><div class="stat-label">เสร็จสิ้น</div></div>
            </div>
            <div class="card text-center" style="color:#666; font-size:12px;">
                <p>ข้อมูลอัปเดตล่าสุด: <span id="lastUpdate">Now</span></p>
            </div>
        </div>
    </div>

    <div id="modalFeedback" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--danger-color); margin-top:0;">แจ้งแก้ไข / ตีกลับงาน</h3>
            <label class="input-label">สาเหตุที่ต้องแก้ไข</label>
            <input type="hidden" id="fbOrderNo">
            <textarea id="fbReason" rows="3" placeholder="เช่น สกรีนผิดตำแหน่ง, ผ้ามีตำหนิ..."></textarea>
            <div class="flex-row">
                <button class="btn" style="background:#444;" onclick="closeModal()">ยกเลิก</button>
                <button class="btn" style="background:var(--danger-color);" onclick="confirmRollback()">ยืนยันส่งกลับ</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_API = 'https://script.google.com/macros/s/AKfycbwmH4YpD9SSN0E8VJ47p0LdwtJmcZsP2TR0RS7hGKdHyJ1CYoHbvivGiAa3uFKyhPGz6w/exec'; 
        const LIFF_ID = '2009142530-l2sIA52W';

        let userProfile = {};
        let currentUserRole = '';
        let globalOrders = []; // Store orders for filtering

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            userProfile = await liff.getProfile();
            checkUser();
        }
        main();

        function checkUser() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_user', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                document.getElementById('loader').classList.add('hidden');
                if (res.found) {
                    currentUserRole = res.data.Role;
                    if (['Admin', 'Sale admin', 'PM', 'QC', 'Merchandiser'].includes(currentUserRole)) {
                        showStaffDashboard(res.data);
                    } else {
                        showCustomerView(res.data);
                    }
                } else {
                    document.getElementById('viewRegister').classList.remove('hidden');
                }
            });
        }

        // --- STAFF SECTION ---
        function showStaffDashboard(data) {
            document.getElementById('viewStaff').classList.remove('hidden');
            document.getElementById('staffName').innerText = data.RealName;
            document.getElementById('staffRole').innerText = data.Role;

            if (data.Role === 'Sale admin' || data.Role === 'Admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminTabs').classList.remove('hidden'); // Show History Tab
                fetchOptions();
            }
            fetchStaffData();
        }

        function fetchStaffData() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_all_orders' }) })
            .then(r => r.json()).then(res => {
                globalOrders = res.orders; // Keep for filtering
                renderStaffList('active'); // Default view
            });
        }

        // Filter Logic (Status/ID)
        function filterStaffList() {
            const keyword = document.getElementById('staffFilter').value.toLowerCase();
            const currentTab = document.querySelector('#adminTabs .active')?.onclick.toString().includes('history') ? 'history' : 'active';
            renderStaffList(currentTab, keyword);
        }

        function switchAdminTab(mode) {
            document.querySelectorAll('#adminTabs .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderStaffList(mode);
        }

        function renderStaffList(mode = 'active', filter = '') {
            const list = document.getElementById('staffTaskList');
            let filtered = globalOrders;

            // 1. Role Filter Logic (Hide Shipped for non-Sales)
            if (currentUserRole !== 'Sale admin' && currentUserRole !== 'Admin') {
                filtered = filtered.filter(o => o.status !== 'Shipped');
            } else {
                // Sale Admin: Split by Tab
                if (mode === 'active') filtered = filtered.filter(o => o.status !== 'Shipped');
                else filtered = filtered.filter(o => o.status === 'Shipped');
            }

            // 2. Search Filter
            if (filter) {
                filtered = filtered.filter(o => 
                    o.orderNo.toLowerCase().includes(filter) || 
                    o.status.toLowerCase().includes(filter)
                );
            }

            if (filtered.length === 0) { list.innerHTML = '<p style="text-align:center; color:#666">ไม่พบรายการ</p>'; return; }

            let html = '';
            filtered.forEach(o => {
                let btns = '';
                
                // Helper to disable buttons if step is passed
                const isPassed = (currentStep, targetStep) => {
                    const steps = ['Order Confirmed', 'Work Order Approved', 'Sample Sent', 'PP Approved', 'Production 50%', 'Final QC Passed', 'Shipped'];
                    return steps.indexOf(currentStep) >= steps.indexOf(targetStep);
                };

                // PM Buttons
                if (currentUserRole === 'PM' || currentUserRole === 'Admin') {
                    // Approve WO
                    if (isPassed(o.status, 'Work Order Approved')) {
                        btns += `<button class="btn btn-disabled">📋 WO Approved แล้ว</button>`;
                    } else {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'WO_APPROVE')">📋 อนุมัติ WO</button>`;
                    }
                    
                    // Update 50% (Only available after WO Approved)
                    if (isPassed(o.status, 'Production 50%')) {
                        btns += `<button class="btn btn-disabled">⚡ ผลิต 50% แล้ว</button>`;
                    } else if (isPassed(o.status, 'Work Order Approved')) {
                        btns += `<button class="btn btn-pm" onclick="updateStatus('${o.orderNo}', 'UPDATE_50')">⚡ ผลิต 50%</button>`;
                    }
                }

                // Merch Buttons
                if (currentUserRole === 'Merchandiser' || currentUserRole === 'Admin') {
                    if (isPassed(o.status, 'Sample Sent')) {
                         btns += `<button class="btn btn-disabled">📦 ส่งตัวอย่างแล้ว</button>`;
                    } else {
                         btns += `<div style="margin-top:5px; border-top:1px dashed #444; padding-top:5px;">
                            <input type="text" id="track-s-${o.orderNo}" placeholder="Tracking ตัวอย่าง" style="font-size:12px;">
                            <button class="btn btn-merch" onclick="sendSample('${o.orderNo}')">📦 ส่งตัวอย่าง</button>
                        </div>`;
                    }

                    if (isPassed(o.status, 'PP Approved')) {
                        btns += `<button class="btn btn-disabled">✨ ลูกค้าอนุมัติแล้ว</button>`;
                    } else if(isPassed(o.status, 'Sample Sent')) {
                        btns += `<button class="btn btn-qc" onclick="updateStatus('${o.orderNo}', 'PP_APPROVE')">✨ ลูกค้าอนุมัติ (PP)</button>`;
                    }
                }

                // QC Buttons
                if (currentUserRole === 'QC' || currentUserRole === 'Admin') {
                    if (isPassed(o.status, 'Final QC Passed')) {
                        btns += `<button class="btn btn-disabled">✅ ผ่าน QC แล้ว</button>`;
                    } else if(isPassed(o.status, 'Production 50%')) {
                        btns += `<button class="btn btn-qc" onclick="updateStatus('${o.orderNo}', 'QC_PASS')">✅ ผ่าน QC</button>`;
                        btns += `<button class="btn btn-reject" onclick="openFeedback('${o.orderNo}')"><i class="fas fa-undo"></i> ตีกลับ</button>`;
                    }
                }

                // Sale Buttons (Ship)
                if (currentUserRole === 'Sale admin' || currentUserRole === 'Admin') {
                    if (o.status !== 'Shipped' && isPassed(o.status, 'Final QC Passed')) {
                        btns += `<div style="margin-top:5px;">
                            <input type="text" id="track-${o.orderNo}" placeholder="Tracking สินค้าจริง" style="font-size:12px;">
                            <button class="btn btn-ship" onclick="shipOrder('${o.orderNo}')">🚚 ยืนยันส่งของ</button>
                        </div>`;
                    } else if (o.status === 'Shipped') {
                        btns += `<div style="margin-top:5px; font-size:12px; color:var(--success-color);">✔ ส่งแล้ว (Track: ${o.tracking || '-'})</div>`;
                    }
                }

                // Correction Alert
                if (o.status === 'Correction Needed') {
                    html += `<div class="card" style="border:1px solid var(--danger-color)">
                        <strong style="color:var(--danger-color)">⚠ งานต้องแก้ไข (${o.orderNo})</strong>
                        <p style="font-size:12px;">เหตุผล: ${o.feedback}</p>
                        <button class="btn" style="background:#333" onclick="updateStatus('${o.orderNo}', 'WO_APPROVE')">ส่งอนุมัติใหม่</button>
                    </div>`;
                } else {
                    // Normal Card
                    html += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <strong style="color:var(--accent-color)">${o.orderNo}</strong>
                            <span class="status-badge">${o.status}</span>
                        </div>
                        <p style="font-size:13px; color:#ccc;">${o.style} (${o.qty} ตัว)<br><small>Update: ${o.updatedDate}</small></p>
                        ${btns}
                    </div>`;
                }
            });
            list.innerHTML = html;
        }

        // --- CUSTOMER SECTION ---
        function showCustomerView(data) {
            document.getElementById('viewCustomer').classList.remove('hidden');
            document.getElementById('custHeaderName').innerText = "สวัสดีคุณ " + data.RealName;
            
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_my_orders', data: { userId: userProfile.userId } }) })
            .then(r => r.json()).then(res => {
                // Calculate Stats
                let confirm = 0, prod = 0, done = 0;
                res.orders.forEach(o => {
                    if(o.status === 'Shipped') done++;
                    else if(o.status === 'Order Confirmed') confirm++;
                    else prod++;
                });
                document.getElementById('stat-confirm').innerText = confirm;
                document.getElementById('stat-prod').innerText = prod;
                document.getElementById('stat-done').innerText = done;

                // Render List
                const list = document.getElementById('customerOrderList');
                if (res.orders.length === 0) { list.innerHTML = '<p style="text-align:center; color:#666">ไม่มีออเดอร์</p>'; return; }
                list.innerHTML = res.orders.map(o => renderOrderCard(o)).join('');
            });
        }

        function switchCustTab(tab) {
            document.querySelectorAll('#viewCustomer .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'list') {
                document.getElementById('custListView').classList.remove('hidden');
                document.getElementById('custDashView').classList.add('hidden');
            } else {
                document.getElementById('custListView').classList.add('hidden');
                document.getElementById('custDashView').classList.remove('hidden');
            }
        }

        function renderOrderCard(o) {
            const steps = [
                { label: 'รับงาน', active: true }, 
                { label: 'เตรียม', active: ['Work Order Approved', 'Sample Sent', 'PP Approved', 'Production 50%', 'Final QC Passed', 'Shipped'].includes(o.status) },
                { label: 'ผลิต', active: ['Production 50%', 'Final QC Passed', 'Shipped'].includes(o.status) },
                { label: 'QC', active: ['Final QC Passed', 'Shipped'].includes(o.status) },
                { label: 'ส่งของ', active: ['Shipped'].includes(o.status) }
            ];

            let progressHtml = '<div class="stepper-wrapper">';
            steps.forEach(s => {
                progressHtml += `
                    <div class="stepper-item ${s.active ? 'active' : ''}">
                        <div class="step-counter"></div>
                        <div class="step-name">${s.label}</div>
                    </div>`;
            });
            progressHtml += '</div>';

            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong style="color:var(--accent-color)">${o.orderNo}</strong>
                        <span class="status-badge">${o.status}</span>
                    </div>
                    <div style="font-size:14px; color:#ddd;">
                        ${o.style} (${o.qty} ตัว)<br>
                        <i class="far fa-calendar"></i> ส่ง: ${o.delivery}
                    </div>
                    ${progressHtml}
                </div>`;
        }

        // --- ACTIONS ---
        function openFeedback(orderNo) {
            document.getElementById('fbOrderNo').value = orderNo;
            document.getElementById('modalFeedback').classList.add('show');
        }
        function closeModal() { document.getElementById('modalFeedback').classList.remove('show'); }
        
        function confirmRollback() {
            const no = document.getElementById('fbOrderNo').value;
            const reason = document.getElementById('fbReason').value;
            if(!reason) return alert("กรุณาระบุเหตุผล");
            callApi({ orderNo: no, actionType: 'ROLLBACK', reason: reason, staffName: document.getElementById('staffName').innerText });
            closeModal();
        }

        function updateStatus(no, action) { 
            if(!confirm('ยืนยันทำรายการ?')) return;
            callApi({ orderNo: no, actionType: action, staffName: document.getElementById('staffName').innerText });
        }
        function sendSample(no) {
            const t = document.getElementById(`track-s-${no}`).value;
            if(!t) return alert("กรอก Tracking");
            callApi({ orderNo: no, actionType: 'SEND_SAMPLE', tracking: t, staffName: document.getElementById('staffName').innerText });
        }
        function shipOrder(no) {
            const t = document.getElementById(`track-${no}`).value;
            if(!t) return alert("กรุณากรอกเลขพัสดุ");
            callApi({ orderNo: no, actionType: 'SHIP', tracking: t, staffName: document.getElementById('staffName').innerText });
        }

        function callApi(payload) {
            document.getElementById('loader').classList.remove('hidden');
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'update_status', data: payload }) })
            .then(r => r.json()).then(res => {
                document.getElementById('loader').classList.add('hidden');
                if (res.status === 'success') { alert("สำเร็จ!"); fetchStaffData(); }
                else alert("Error: " + res.message);
            });
        }

        function register() {
            const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value;
            if(!n || !p) return alert("กรอกข้อมูลให้ครบ");
            document.getElementById('loader').classList.remove('hidden');
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'register', data: { userId: userProfile.userId, displayName: userProfile.displayName, realName: n, phone: p } }) })
            .then(() => location.reload());
        }

        function createOrder() {
            const payload = {
                adminName: document.getElementById('staffName').innerText,
                phone: document.getElementById('ordPhone').value,
                style: document.getElementById('ordStyle').value,
                qty: document.getElementById('ordQty').value,
                fabric: document.getElementById('ordFabric').value,
                deliveryDate: document.getElementById('ordDate').value,
                detail: document.getElementById('ordDetail').value
            };
            if(!payload.phone || !payload.style) return alert("กรุณากรอกข้อมูลให้ครบ");
            document.getElementById('loader').classList.remove('hidden');
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'create_order', data: payload }) })
            .then(r => r.json()).then(res => {
                document.getElementById('loader').classList.add('hidden');
                if(res.status==='success') { alert("เปิดออเดอร์เรียบร้อย!"); fetchStaffData(); document.getElementById('createOrderForm').classList.add('hidden'); }
                else alert("Error: " + res.message);
            });
        }

        function fetchOptions() {
            fetch(GAS_API, { method: 'POST', body: JSON.stringify({ action: 'get_options' }) })
            .then(r => r.json()).then(res => {
                const s = document.getElementById('ordStyle'), f = document.getElementById('ordFabric');
                s.innerHTML = '<option value="" disabled selected>เลือก...</option>';
                f.innerHTML = '<option value="" disabled selected>เลือก...</option>';
                res.data.styles.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
                res.data.fabrics.forEach(v => f.innerHTML += `<option value="${v}">${v}</option>`);
            });
        }
    </script>
</body>
</html>
